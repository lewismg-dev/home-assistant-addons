name: Brightgate Connector
version: "2.4.5"
slug: brightgate_support_tunnel
description: >-
  Brightgate remote support — self-enrolling connector. Owns the on-demand
  Tailscale Serve tunnel, the outbound heartbeat, and the homeowner grant/revoke
  control (its own panel). Vendor-managed; not homeowner-editable.
url: https://brightgatesolutions.com.au
arch:
  - aarch64
  - amd64
init: false
# Always-on so the heartbeat runs even when support is OFF. The tunnel itself
# is still on-demand (Tailscale only comes up during a granted session).
boot: auto
startup: services
host_network: false
# homeassistant_api: read HA stats (version/states) for the heartbeat via the
# Supervisor proxy. hassio_api: read our own add-on/version info.
# hassio_role homeassistant: the MINIMUM role that can read `/core/logs` (the
# Core log the portal needs). We deliberately do NOT use `manager`: that would
# also unlock `/supervisor/logs`, but at the price of Supervisor-wide privileges
# (install/start/stop/uninstall add-ons, etc.). Least privilege — a compromised
# connector can read the Core log and nothing more. The Supervisor log is
# therefore not collected (see collect_logs in app.py); `/supervisor/logs` 403s
# at this role by design.
# NOTE: no `map:` entry on purpose — the add-on still cannot touch /config, which
# is the tamper-isolation we want. The role grants Supervisor *API* read access,
# not filesystem access.
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
# The homeowner grant/revoke UI is served BY the add-on over Ingress, so there
# are no editable helpers/automations/dashboards in HA to break.
ingress: true
ingress_port: 8099
panel_icon: mdi:lifebuoy
panel_title: Brightgate Support
options:
  portal_url: "https://portal.brightgatesolutions.com.au"
  log_level: "info"
schema:
  portal_url: url
  log_level: "list(debug|info|warning|error)?"
