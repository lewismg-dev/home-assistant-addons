# Brightgate Connector (v2) — Home Assistant setup
# ============================================================================
# v2 is self-contained. The homeowner-facing control, the heartbeat, the
# session logic and the tunnel all live INSIDE the add-on. There are no helpers,
# automations, rest_commands or dashboards to add per client.
#
# Per-machine install:
#   1. Add the Brightgate add-on repository and install "Brightgate Connector".
#   2. Open the add-on's panel (sidebar) and paste the enrollment code from the
#      Brightgate portal (Client page -> Generate enrollment code).
#   3. Done. The connector heartbeats immediately; support is granted/revoked
#      from that same panel.
#
# The ONLY Home Assistant config requirement — bake this into the golden image
# ONCE (it is identical on every machine: 172.30.32.0/23 is the Supervisor add-on
# network, needed so Tailscale Serve's reverse proxy is accepted):
#
#   http:
#     use_x_forwarded_for: true
#     trusted_proxies:
#       - 172.30.32.0/23
#
# Nothing else. No secrets, client_id, hostname, slug, or YAML per client.
#
# ---------------------------------------------------------------------------
# Migrating a v1 install (had helpers + automations + rest_command):
#   After enrolling v2, remove the old per-machine bits so there is one source
#   of truth: input_boolean.brightgate_support_access, input_select
#   .brightgate_support_duration, timer.brightgate_support_session, the three
#   brightgate_support_* automations, and rest_command.brightgate_heartbeat /
#   brightgate_event. The connector now owns all of it.
